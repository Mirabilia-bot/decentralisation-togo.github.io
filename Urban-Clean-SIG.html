<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URBAN-CLEAN | Spot2gether & KGM Expertise</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <style>
    body { margin:0; font-family:'Times New Roman', serif; background:#f4f4f4; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #filters { padding:10px; background:#e8f5e9; display:flex; gap:15px; flex-wrap:wrap; z-index: 1001; align-items: flex-end; }
    #map { height:50vh; width: 100%; position: sticky; top: 0; z-index: 1000; flex-shrink: 0; }
    #dashboard { flex-grow: 1; background:white; padding:15px; box-shadow:0 -5px 15px rgba(0,0,0,0.1); overflow-y:auto; }
    canvas { max-height:200px; margin-top:15px; }
    #addBtn { display:block; width:90%; margin:10px auto; padding:12px; font-size:1.1em; background:#fc3d21; color:white; border:none; border-radius:8px; cursor:pointer; }
    label { font-weight: bold; display: block; }
    input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
    .commune-label { background: transparent; border: none; box-shadow: none; font-weight: bold; color: #1b5e20; text-shadow: 1px 1px 2px white; pointer-events: none; }
  </style>
</head>
<body>
  <div id="filters">
    <div style="min-width: 150px;">
      <label>Quartier :</label>
      <select id="filterQuartier" onchange="toggleAutreFiltre(this.value); applyFilters();">
        <option value="all">Tous</option>
        <option value="Kliklamé">Kliklamé</option>
        <option value="Bé">Bé</option>
        <option value="Tokoin">Tokoin</option>
        <option value="Autres">Autres...</option>
      </select>
      <input type="text" id="filterAutreQuartier" placeholder="Nom du quartier" style="display:none; margin-top:5px;" oninput="applyFilters()">
    </div>
    <div>
      <label>Type :</label>
      <select id="filterType" onchange="applyFilters()">
        <option value="all">Tous</option>
        <option value="dechets">Déchets</option>
        <option value="pollution">Pollution</option>
        <option value="securite">Sécurité</option>
      </select>
    </div>
    <div>
      <label>Date :</label>
      <input type="date" id="filterDate" onchange="applyFilters()">
    </div>
    <button onclick="demanderPosition()" style="padding: 8px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white;">📍 Me localiser</button>
  </div>

  <div id="map"></div>
  
  <div id="dashboard">
    <button id="addBtn">➕ Ajouter un point signalé</button>
    <h3>Tableau de bord</h3>
    <div id="stats"></div>
    <canvas id="chartTypes"></canvas>
    <canvas id="chartQuartiers"></canvas>
  </div>

  <div id="modalForm" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:2000;justify-content:center;align-items:center;">
    <div style="background:white;padding:20px;border-radius:10px;width:90%;max-width:400px;max-height:90vh;overflow-y:auto;">
      <h3 style="margin-top:0;color:#1b5e20;">Nouveau signalement</h3>
      <label>Titre / Description courte</label>
      <input type="text" id="titre">
      <label>Quartier</label>
      <select id="quartier" onchange="toggleAutreModal(this.value)">
        <option>Kliklamé</option><option>Bé</option><option>Tokoin</option><option value="Autres">Autres (Préciser...)</option>
      </select>
      <div id="divAutreModal" style="display:none; margin-top:5px;"><input type="text" id="modalAutreQuartier" placeholder="Saisir le quartier"></div>
      <label>Type d’alerte</label>
      <select id="type"><option value="dechets">Déchets</option><option value="pollution">Pollution</option><option value="securite">Sécurité</option></select>
      <button style="margin-top:15px;padding:12px;width:100%;border:none;border-radius:8px;background:#1b5e20;color:white;cursor:pointer;" onclick="soumettreForm()">✅ Valider le signalement</button>
      <button style="margin-top:8px;padding:12px;width:100%;border:none;border-radius:8px;background:#fc3d21;color:white;cursor:pointer;" onclick="fermerForm()">❌ Annuler</button>
    </div>
  </div>

<script>
  var map = L.map('map').setView([6.1319,1.2228],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  fetch("communes.geojson")
    .then(res => res.json())
    .then(geojson => {
      L.geoJSON(geojson, {
        style: {color: "#1b5e20", weight: 2, fillOpacity: 0.05},
        onEachFeature: function(feature, layer) {
          if (feature.properties && feature.properties.nom) {
            layer.bindTooltip(feature.properties.nom, {permanent: true, direction: "center", className: "commune-label"});
          }
        }
      }).addTo(map);
    });

  const icons = {
    dechets: L.divIcon({className:'custom-div-icon', html:'<i class="fas fa-trash" style="color:#fc3d21;font-size:22px"></i>', iconSize:[30,42], iconAnchor:[15,42]}),
    pollution: L.divIcon({className:'custom-div-icon', html:'<i class="fas fa-smog" style="color:#007bff;font-size:22px"></i>', iconSize:[30,42], iconAnchor:[15,42]}),
    securite: L.divIcon({className:'custom-div-icon', html:'<i class="fas fa-exclamation-triangle" style="color:#f57c00;font-size:22px"></i>', iconSize:[30,42], iconAnchor:[15,42]})
  };

  const data = [
    {quartier:'Kliklamé',type:'dechets',desc:'Tas d’ordures',lat:6.14,lng:1.22,date:'2025-08-23'},
    {quartier:'Bé',type:'pollution',desc:'Fumée industrielle',lat:6.13,lng:1.21,date:'2025-09-02'},
    {quartier:'Tokoin',type:'securite',desc:'Décharge sauvage',lat:6.15,lng:1.23,date:'2025-09-05'}
  ];

  let markers = L.layerGroup().addTo(map);
  let chart1 = null, chart2 = null;

  function renderMap(filtered){
    markers.clearLayers();
    filtered.forEach(d=>{
      L.marker([d.lat, d.lng],{icon:icons[d.type]}).addTo(markers).bindPopup(`<b>${d.desc}</b><br><small>${d.quartier} - ${d.date}</small>`);
    });
  }

  function updateDashboard(filtered){
    document.getElementById('stats').innerHTML = `<b>${filtered.length}</b> signalements`;
    const typeCount={}, quartierCount={};
    filtered.forEach(d=>{
      typeCount[d.type]=(typeCount[d.type]||0)+1;
      quartierCount[d.quartier]=(quartierCount[d.quartier]||0)+1;
    });
    if(chart1) chart1.destroy(); if(chart2) chart2.destroy();
    chart1 = new Chart(document.getElementById('chartTypes'),{type:'pie',data:{labels:Object.keys(typeCount),datasets:[{data:Object.values(typeCount),backgroundColor:['#fc3d21','#007bff','#f57c00']}]}});
    chart2 = new Chart(document.getElementById('chartQuartiers'),{type:'bar',data:{labels:Object.keys(quartierCount),datasets:[{label:'Signalements',data:Object.values(quartierCount),backgroundColor:'#1b5e20'}]}});
  }

  function applyFilters(){
    let q=document.getElementById('filterQuartier').value;
    if(q==="Autres") q=document.getElementById('filterAutreQuartier').value;
    const t=document.getElementById('filterType').value;
    const d=document.getElementById('filterDate').value;
    const filtered=data.filter(x=>(q==="all"||x.quartier.toLowerCase()===q.toLowerCase())&&(t==="all"||x.type===t)&&(!d||x.date===d));
    renderMap(filtered); updateDashboard(filtered);
  }

  function toggleAutreFiltre(val) { document.getElementById('filterAutreQuartier').style.display = (val === "Autres") ? "block" : "none"; }
  function toggleAutreModal(val) { document.getElementById('divAutreModal').style.display = (val === "Autres") ? "block" : "none"; }
  function demanderPosition(){ navigator.geolocation.getCurrentPosition(pos => { map.setView([pos.coords.latitude, pos.coords.longitude], 15); L.circle([pos.coords.latitude, pos.coords.longitude], {radius: 50, color: 'blue'}).addTo(map); }, () => alert("Géolocalisation échouée.")); }
  function fermerForm() { document.getElementById('modalForm').style.display='none'; }

  function soumettreForm(){
    const titre = document.getElementById('titre').value;
    const type = document.getElementById('type').value;
    let q = document.getElementById('quartier').value;
    if(q === "Autres") q = document.getElementById('modalAutreQuartier').value || "Autre";
    const center = map.getCenter();
    data.push({quartier: q, type: type, desc: titre || "Signalement", lat: center.lat, lng: center.lng, date: new Date().toISOString().split('T')[0]});
    applyFilters(); fermerForm();
  }

  document.getElementById('addBtn').onclick = () => document.getElementById('modalForm').style.display='flex';
  applyFilters();
</script>
</body>
</html>
