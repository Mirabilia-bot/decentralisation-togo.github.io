<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatoire Géospatial - KGM Expertise</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Times New Roman', serif; margin: 0; padding: 0; }
        header { background: #00264d; color: white; padding: 20px; text-align: center; }
        #map { height: 75vh; width: 100%; border-bottom: 3px solid #00264d; }
        .description { padding: 15px; background: #f4f4f4; border-left: 5px solid #00264d; margin: 10px; }
        .btn-retour { display: inline-block; padding: 10px 20px; background: #00264d; color: white; text-decoration: none; border-radius: 5px; margin: 20px; font-weight: bold; }
        /* Style pour la légende */
        .legend { background: white; padding: 10px; line-height: 18px; color: #333; border: 2px solid #00264d; border-radius: 5px; }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 0.7; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">Observatoire des Infrastructures Sanitaires</h1>
    <p style="margin:5px 0 0 0; font-style: italic; font-size: 0.9em;">Expertise Géospatiale & Gouvernance Territoriale</p>
</header>

<div class="description">
    <p style="margin:0;">Visualisation interactive : Répartition des pharmacies au sein des <strong>Collectivités territoriales</strong>.</p>
</div>

<div id="map"></div>

<a href="index.html" class="btn-retour">← Retour à l'accueil</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([6.18, 1.20], 12);

    // FOND DE CARTE COLORÉ (OpenStreetMap Standard)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // FONCTION POUR GÉNÉRER AUTOMATIQUEMENT TOUTES LES INFOS
    function showAllProps(properties) {
        var table = "<table style='font-family:Times New Roman; border-collapse:collapse;'>";
        for (var key in properties) {
            table += "<tr style='border-bottom:1px solid #ddd;'><td style='padding:4px; font-weight:bold;'>" + key + " :</td><td style='padding:4px;'>" + properties[key] + "</td></tr>";
        }
        table += "</table>";
        return table;
    }

    // CHARGEMENT DES COMMUNES
    fetch('./communes.geojson')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: { color: "#00264d", weight: 2, fillOpacity: 0.1 },
                onEachFeature: function (feature, layer) {
                    layer.bindPopup("<h3>Informations Territoriales</h3>" + showAllProps(feature.properties));
                }
            }).addTo(map);
        });

    // CHARGEMENT DES PHARMACIES
    fetch('./pharmacies.geojson')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                pointToLayer: function (feature, latlng) {
                    return L.circleMarker(latlng, { radius: 8, fillColor: "#28a745", color: "#fff", weight: 2, fillOpacity: 1 });
                },
                onEachFeature: function (feature, layer) {
                    layer.bindPopup("<h3>Détails Pharmacie</h3>" + showAllProps(feature.properties));
                }
            }).addTo(map);
        });
    // AJOUT DE LA LÉGENDE (Maintenue et fixée)
var legend = L.control({position: 'bottomright'});

legend.onAdd = function (map) {
    var div = L.DomUtil.create('div', 'legend');
    div.style.backgroundColor = "white";
    div.style.padding = "10px";
    div.style.border = "2px solid #00264d";
    div.style.fontFamily = "Times New Roman";
    div.style.fontSize = "13px";
    div.style.lineHeight = "20px";
    div.style.borderRadius = "5px";
    div.style.boxShadow = "0 0 15px rgba(0,0,0,0.2)";

    div.innerHTML = "<b style='color:#00264d; font-size:14px;'>Légende KGM</b><br>" +
        "<i style='background: rgba(0, 38, 77, 0.2); width: 15px; height: 15px; display: inline-block; border: 2px solid #00264d; margin-right: 8px; vertical-align: middle;'></i> Limite Communale<br>" +
        "<i style='background: #28a745; width: 12px; height: 12px; display: inline-block; border-radius: 50%; border: 2px solid white; margin-right: 8px; vertical-align: middle;'></i> Pharmacie";
    return div;
};

legend.addTo(map);
    
                        </script>
    
</body>
</html>
